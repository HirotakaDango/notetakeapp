
<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <meta name="apple-mobile-web-app-title" content="NoteTakeApp" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link id="manifest-link" rel="manifest" href="">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

      :root[data-theme="light"] {
        --md-sys-color-primary: #0061a4;
        --md-sys-color-on-primary: #ffffff;
        --md-sys-color-primary-container: #d1e4ff;
        --md-sys-color-on-primary-container: #001d36;
        --md-sys-color-secondary-container: #e8def8;
        --md-sys-color-on-secondary-container: #1d192b;
        --md-sys-color-surface: #fdfcff;
        --md-sys-color-surface-container-low: #f3f3fa;
        --md-sys-color-surface-container: #ededf4;
        --md-sys-color-surface-container-high: #e7e8ee;
        --md-sys-color-on-surface: #1a1c1e;
        --md-sys-color-on-surface-variant: #43474e;
        --md-sys-color-outline: #73777f;
        --md-sys-color-outline-variant: #c3c7cf;
        --md-sys-color-error: #ba1a1a;
        --md-sys-color-shadow: rgba(0, 0, 0, 0.08);
        --md-sys-color-scrim: rgba(0, 0, 0, 0.3);
      }

      :root[data-theme="dark"] {
        --md-sys-color-primary: #9ecaef;
        --md-sys-color-on-primary: #003258;
        --md-sys-color-primary-container: #00497d;
        --md-sys-color-on-primary-container: #d1e4ff;
        --md-sys-color-secondary-container: #4a4458;
        --md-sys-color-on-secondary-container: #e8def8;
        --md-sys-color-surface: #131314;
        --md-sys-color-surface-container-low: #1c1f23;
        --md-sys-color-surface-container: #202428;
        --md-sys-color-surface-container-high: #2b2f33;
        --md-sys-color-on-surface: #e2e2e6;
        --md-sys-color-on-surface-variant: #c3c7cf;
        --md-sys-color-outline: #8d9199;
        --md-sys-color-outline-variant: #43474e;
        --md-sys-color-error: #ffb4ab;
        --md-sys-color-shadow: rgba(0, 0, 0, 0.4);
        --md-sys-color-scrim: rgba(0, 0, 0, 0.6);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        background-color: var(--md-sys-color-surface);
        color: var(--md-sys-color-on-surface);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        height: 100dvh;
        overflow: hidden;
        transition: background-color 0.3s, color 0.3s;
      }

      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--md-sys-color-outline-variant); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--md-sys-color-outline); }

      .icon {
        width: 24px;
        height: 24px;
        fill: currentColor;
        display: inline-block;
      }

      button {
        font-family: inherit;
      }

      .app-container {
        display: flex;
        height: 100%;
        width: 100%;
      }

      .sidebar {
        max-width: 300px;
        background-color: var(--md-sys-color-surface-container-low);
        display: flex;
        flex-direction: column;
        transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        z-index: 100;
        border-right: 1px solid var(--md-sys-color-outline-variant);
      }

      .sidebar-header {
        padding: 16px 16px 0 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      #closeSidebarBtn {
        display: none;
      }

      .drawer-list {
        list-style: none;
        overflow-y: auto;
        padding: 0 12px 24px 12px;
        flex-grow: 1;
      }

      .drawer-item {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 16px;
        border-radius: 100px;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--md-sys-color-on-surface-variant);
        transition: background-color 0.2s, color 0.2s, transform 0.1s;
        margin-bottom: 4px;
      }

      .drawer-item:hover {
        background-color: var(--md-sys-color-surface-container-high);
        color: var(--md-sys-color-on-surface);
      }

      .drawer-item:active {
        transform: scale(0.98);
      }

      .drawer-item.active {
        background-color: var(--md-sys-color-primary-container);
        color: var(--md-sys-color-on-primary-container);
      }

      .drawer-section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 16px 8px 16px;
      }

      .drawer-section-title {
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--md-sys-color-outline);
      }

      .drawer-divider {
        height: 1px;
        background-color: var(--md-sys-color-outline-variant);
        margin: 12px 16px;
      }

      .icon-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 8px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--md-sys-color-on-surface-variant);
        transition: background-color 0.2s, color 0.2s, transform 0.2s;
        flex-shrink: 0;
      }

      .icon-btn:hover {
        background-color: var(--md-sys-color-surface-container-high);
        color: var(--md-sys-color-on-surface);
      }

      .icon-btn:active {
        transform: scale(0.9);
      }

      .fab {
        position: fixed;
        bottom: 32px;
        right: 32px;
        background-color: var(--md-sys-color-primary-container);
        color: var(--md-sys-color-on-primary-container);
        border: none;
        border-radius: 16px;
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 4px 12px var(--md-sys-color-shadow);
        transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.2s;
        z-index: 90;
      }

      .fab:hover {
        transform: translateY(-4px) scale(1.02);
        box-shadow: 0 8px 24px var(--md-sys-color-shadow);
      }

      .fab:active {
        transform: translateY(0) scale(0.95);
      }

      .main-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
        background-color: var(--md-sys-color-surface);
      }

      .top-bar {
        display: flex;
        align-items: center;
        padding: 12px 24px;
        min-height: 72px;
        gap: 16px;
      }

      .search-container {
        flex-grow: 1;
        max-width: 720px;
        position: relative;
        display: flex;
        align-items: center;
      }

      .search-input {
        width: 100%;
        height: 48px;
        padding: 0 20px 0 52px;
        border-radius: 24px;
        border: 1px solid transparent;
        background-color: var(--md-sys-color-surface-container);
        color: var(--md-sys-color-on-surface);
        font-size: 1rem;
        outline: none;
        transition: background-color 0.2s, box-shadow 0.2s, border-color 0.2s;
      }

      .search-input:focus {
        background-color: var(--md-sys-color-surface);
        border-color: var(--md-sys-color-primary);
        box-shadow: 0 0 0 3px rgba(0, 97, 164, 0.15);
      }

      .search-icon {
        position: absolute;
        left: 20px;
        color: var(--md-sys-color-on-surface-variant);
        pointer-events: none;
      }

      .notes-view {
        flex-grow: 1;
        overflow-y: auto;
        padding: 24px;
      }

      .notes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
        max-width: 1600px;
        margin: 0 auto;
      }

      .note-card {
        background-color: var(--md-sys-color-surface-container-low);
        border: 1px solid var(--md-sys-color-outline-variant);
        border-radius: 16px;
        padding: 20px;
        position: relative;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        min-height: 200px;
        transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.2s, border-color 0.2s;
        overflow: hidden;
      }

      .note-card:hover {
        box-shadow: 0 8px 16px var(--md-sys-color-shadow);
        border-color: var(--md-sys-color-outline);
        transform: translateY(-4px);
        background-color: var(--md-sys-color-surface-container);
      }

      .note-card.selected {
        background-color: var(--md-sys-color-primary-container);
        border-color: var(--md-sys-color-primary);
      }

      .note-card-title {
        font-size: 1.15rem;
        font-weight: 600;
        margin-bottom: 8px;
        padding-right: 32px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        color: var(--md-sys-color-on-surface);
      }

      .note-card-body {
        font-size: 0.95rem;
        color: var(--md-sys-color-on-surface-variant);
        line-height: 1.5;
        flex-grow: 1;
        display: -webkit-box;
        -webkit-line-clamp: 5;
        -webkit-box-orient: vertical;
        overflow: hidden;
        word-break: break-word;
      }

      .note-card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 16px;
        font-size: 0.8rem;
        color: var(--md-sys-color-outline);
      }

      .note-chip {
        background-color: var(--md-sys-color-surface-container-high);
        color: var(--md-sys-color-on-surface-variant);
        padding: 4px 10px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.75rem;
      }

      .card-star-btn {
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 2;
      }

      .card-star-btn.starred {
        color: #f5b041;
      }

      .editor-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100dvh;
        background-color: var(--md-sys-color-surface);
        z-index: 200;
        display: flex;
        flex-direction: column;
        transform: translateY(100%);
        transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .editor-overlay.active {
        transform: translateY(0);
      }

      .editor-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px;
        border-bottom: 1px solid var(--md-sys-color-surface-container-high);
        background-color: var(--md-sys-color-surface);
        flex-shrink: 0;
      }

      .editor-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .editor-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 32px;
        overflow: hidden;
      }

      .editor-header-meta {
        flex-shrink: 0;
        margin-bottom: 24px;
      }

      .editor-title {
        font-size: 2.25rem;
        font-weight: 700;
        border: none;
        outline: none;
        background: transparent;
        color: var(--md-sys-color-on-surface);
        width: 100%;
        margin-bottom: 16px;
        letter-spacing: -0.5px;
      }

      .editor-category-row {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 0.9rem;
        color: var(--md-sys-color-outline);
      }

      .editor-category-row select {
        background-color: var(--md-sys-color-surface-container-high);
        color: var(--md-sys-color-on-surface);
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        font-weight: 500;
        outline: none;
        cursor: pointer;
      }

      .editor-content {
        flex: 1;
        width: 100%;
        border: none;
        outline: none;
        background: transparent;
        color: var(--md-sys-color-on-surface);
        font-size: 1.15rem;
        line-height: 1.7;
        resize: none;
        font-family: inherit;
        overflow-y: auto;
        padding-bottom: 40px;
      }
      
      .editor-content::placeholder {
        color: var(--md-sys-color-outline-variant);
      }

      .editor-footer {
        flex-shrink: 0;
        padding: 12px 32px;
        border-top: 1px solid var(--md-sys-color-surface-container-high);
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
        color: var(--md-sys-color-outline);
        background-color: var(--md-sys-color-surface);
      }

      .find-replace-panel {
        position: absolute;
        top: 80px;
        right: 32px;
        background-color: var(--md-sys-color-surface-container-high);
        border-radius: 16px;
        padding: 16px;
        width: 360px;
        box-shadow: 0 16px 32px var(--md-sys-color-shadow);
        display: none;
        flex-direction: column;
        gap: 12px;
        z-index: 250;
        border: 1px solid var(--md-sys-color-outline-variant);
      }

      .find-replace-panel.active {
        display: flex;
        animation: slideDown 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .find-header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
        font-weight: 600;
        color: var(--md-sys-color-on-surface);
      }

      .find-row {
        display: flex;
        align-items: center;
        gap: 8px;
        background-color: var(--md-sys-color-surface);
        border-radius: 8px;
        padding: 6px 12px;
        border: 1px solid var(--md-sys-color-outline-variant);
      }

      .find-row input {
        flex-grow: 1;
        min-width: 0;
        border: none;
        background: transparent;
        color: var(--md-sys-color-on-surface);
        outline: none;
        padding: 6px 4px;
        font-size: 0.95rem;
      }

      .find-counter {
        flex-shrink: 0;
        font-size: 0.85rem;
        color: var(--md-sys-color-outline);
        min-width: 45px;
        text-align: right;
      }

      .find-actions {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-top: 4px;
      }

      .btn-small {
        background-color: var(--md-sys-color-surface);
        border: 1px solid var(--md-sys-color-outline-variant);
        color: var(--md-sys-color-on-surface);
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 600;
        flex-grow: 1;
        transition: all 0.2s;
      }

      .btn-small:hover {
        background-color: var(--md-sys-color-primary-container);
        color: var(--md-sys-color-on-primary-container);
        border-color: var(--md-sys-color-primary-container);
      }

      .modal-backdrop {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: var(--md-sys-color-scrim);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
        z-index: 1000;
      }

      .modal-backdrop.active {
        opacity: 1;
        pointer-events: auto;
      }

      .modal-card {
        background-color: var(--md-sys-color-surface-container);
        border-radius: 28px;
        padding: 28px;
        width: 90%;
        max-width: 420px;
        transform: scale(0.9);
        transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 24px 38px var(--md-sys-color-shadow);
      }

      .modal-backdrop.active .modal-card {
        transform: scale(1);
      }

      .modal-title {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 20px;
        color: var(--md-sys-color-on-surface);
      }

      .modal-content {
        margin-bottom: 28px;
        color: var(--md-sys-color-on-surface-variant);
        line-height: 1.5;
      }

      .modal-input {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: 2px solid var(--md-sys-color-outline-variant);
        background-color: var(--md-sys-color-surface);
        color: var(--md-sys-color-on-surface);
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s;
      }

      .modal-input:focus {
        border-color: var(--md-sys-color-primary);
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
      }

      .btn {
        padding: 10px 24px;
        border-radius: 100px;
        border: none;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        transition: background-color 0.2s, opacity 0.2s;
      }

      .btn-text {
        background: transparent;
        color: var(--md-sys-color-primary);
      }

      .btn-text:hover {
        background-color: var(--md-sys-color-surface-container-high);
      }

      .btn-filled {
        background-color: var(--md-sys-color-primary);
        color: var(--md-sys-color-on-primary);
      }

      .btn-filled:hover {
        opacity: 0.9;
      }

      .cat-manage-list {
        max-height: 250px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .cat-manage-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--md-sys-color-surface);
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid var(--md-sys-color-outline-variant);
      }

      .selection-bar {
        position: fixed;
        bottom: -100px;
        left: 50%;
        transform: translateX(-50%);
        background-color: var(--md-sys-color-secondary-container);
        color: var(--md-sys-color-on-secondary-container);
        padding: 12px 24px;
        border-radius: 100px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 90%;
        max-width: 600px;
        box-shadow: 0 12px 28px var(--md-sys-color-shadow);
        transition: bottom 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        z-index: 150;
      }
      .selection-bar.active { bottom: 32px; }

      .dropdown {
        position: relative;
        display: inline-flex;
        align-items: center;
      }
      .dropdown-menu {
        position: absolute;
        top: 100%;
        right: 0;
        margin-top: 8px;
        background-color: var(--md-sys-color-surface-container-high);
        border: 1px solid var(--md-sys-color-outline-variant);
        border-radius: 12px;
        min-width: 180px;
        box-shadow: 0 8px 24px var(--md-sys-color-shadow);
        display: none;
        flex-direction: column;
        padding: 8px 0;
        z-index: 500;
      }
      .dropdown-menu.active {
        display: flex;
      }
      .dropdown-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        cursor: pointer;
        color: var(--md-sys-color-on-surface);
        font-size: 0.95rem;
        transition: background-color 0.2s;
      }
      .dropdown-item:hover {
        background-color: var(--md-sys-color-surface-container);
      }

      @media (max-width: 768px) {
        .sidebar { position: absolute; left: -100%; max-width: 300px; height: 100%; box-shadow: 4px 0 16px var(--md-sys-color-shadow); }
        .sidebar.open { left: 0; }
        #closeSidebarBtn { display: inline-flex; margin-bottom: 5%;}
        .notes-grid { grid-template-columns: 1fr; }
        .editor-body { padding: 20px 24px; }
        .find-replace-panel { width: 90%; left: 5%; right: 5%; top: 70px; }
      }

      @media (min-width: 769px) {
        #menuToggleBtn { display: none; }
        #closeSidebarBtn { display: none !important; }
        .search-container { max-width: 100%; }
      }
    </style>
  </head>
  <body>
    <svg style="display: none;">
      <defs>
        <g id="icon-menu"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></g>

    <script>
      let db = null;
      let notes = [];
      let categories = [];
      let activeFilter = 'all'; 
      let activeNote = null;
      let searchTimeout = null;
      let selectedIds = new Set();
      let multiSelectMode = false;
      let saveTimeout = null;
      let findMatches = [];
      let currentMatchIdx = -1;
      let sortBy = 'newest';
      let textHistory = [];
      let historyIdx = -1;
      let historyTimeout = null;
      let currentFilteredNotes = [];
      let renderPage = 1;
      const pageSize = 25;

      async function initDB() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open('MaterialNoteProDB', 2);
          req.onupgradeneeded = e => {
            const database = e.target.result;
            if (!database.objectStoreNames.contains('notes')) database.createObjectStore('notes', { keyPath: 'id' });
            if (!database.objectStoreNames.contains('categories')) database.createObjectStore('categories', { keyPath: 'id' });
          };
          req.onsuccess = e => { db = e.target.result; resolve(); };
          req.onerror = () => reject('DB Error');
        });
      }

      function txPromise(storeName, mode, callback) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, mode);
          const store = tx.objectStore(storeName);
          const req = callback(store);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }

      async function loadData() {
        notes = await txPromise('notes', 'readonly', s => s.getAll());
        categories = await txPromise('categories', 'readonly', s => s.getAll());
        if (categories.length === 0) {
          const defaultCats = ['Personal', 'Work', 'Ideas'];
          for (let c of defaultCats) {
            const catObj = { id: c, name: c };
            await txPromise('categories', 'readwrite', s => s.put(catObj));
            categories.push(catObj);
          }
        }
      }

      async function saveNoteDB(note) {
        await txPromise('notes', 'readwrite', s => s.put(note));
        const idx = notes.findIndex(n => n.id === note.id);
        if (idx > -1) notes[idx] = note; else notes.unshift(note);
      }

      async function deleteNoteDB(id) {
        await txPromise('notes', 'readwrite', s => s.delete(id));
        notes = notes.filter(n => n.id !== id);
      }

      function renderSidebar() {
        const catList = document.getElementById('categoryList');
        catList.innerHTML = '';
        categories.forEach(cat => {
          const li = document.createElement('li');
          li.className = `drawer-item ${activeFilter === cat.id ? 'active' : ''}`;
          li.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><use href="#icon-folder"></use></svg> ${escapeHTML(cat.name)}`;
          li.onclick = () => setFilter(cat.id);
          catList.appendChild(li);
        });
        document.querySelectorAll('.sidebar .drawer-item[data-filter]').forEach(el => {
          el.classList.toggle('active', el.dataset.filter === activeFilter);
        });
      }

      function setFilter(filter) {
        activeFilter = filter;
        renderSidebar();
        renderNotes();
        if (window.innerWidth <= 768) toggleSidebar(false);
      }

      function renderNotes(reset = true) {
        const grid = document.getElementById('notesGrid');
        if (reset) {
          renderPage = 1;
          grid.innerHTML = '';
          const query = document.getElementById('searchInput').value.toLowerCase();
          
          const filtered = notes.filter(n => {
            if (activeFilter === 'starred' && !n.starred) return false;
            if (activeFilter !== 'all' && activeFilter !== 'starred' && n.category !== activeFilter) return false;
            if (query && !n.title.toLowerCase().includes(query) && !n.content.toLowerCase().includes(query)) return false;
            return true;
          });

          filtered.sort((a, b) => {
            return sortBy === 'newest' ? b.modified - a.modified : a.modified - b.modified;
          });

          currentFilteredNotes = filtered;

          if (currentFilteredNotes.length === 0) {
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 48px; color: var(--md-sys-color-outline); font-size: 1.1rem;">No notes found.</div>`;
            return;
          }
        }

        const startIdx = (renderPage - 1) * pageSize;
        const endIdx = startIdx + pageSize;
        const displayList = currentFilteredNotes.slice(startIdx, endIdx); 

        displayList.forEach(note => {
          const isSelected = selectedIds.has(note.id);
          const card = document.createElement('div');
          card.className = `note-card ${isSelected ? 'selected' : ''}`;
          card.dataset.id = note.id;
          
          const displayTitle = (note.title && note.title.trim()) ? note.title : 
                               (note.content && note.content.trim() ? note.content.trim().split(/\s+/).slice(0, 5).join(' ') : 'title');
          
          card.innerHTML = `
            <div class="note-card-title">${escapeHTML(displayTitle)}</div>
            <div class="note-card-body">${escapeHTML(note.content || '')}</div>
            <div class="note-card-footer">
              <span>${new Date(note.modified).toLocaleDateString()}</span>
              ${note.category && note.category !== 'all' ? `<span class="note-chip">${escapeHTML(getCategoryName(note.category))}</span>` : ''}
            </div>
          `;

          let pressTimer;
          let startX = 0, startY = 0;
          let wasLongPress = false;
          
          const startPress = (e) => { 
            wasLongPress = false;
            if (e.touches) {
              startX = e.touches[0].clientX;
              startY = e.touches[0].clientY;
            }
            pressTimer = setTimeout(() => { 
              wasLongPress = true;
              toggleMultiSelect(note.id); 
              if (navigator.vibrate) navigator.vibrate(50);
            }, 600); 
          };
          
          const cancelPress = () => clearTimeout(pressTimer);
          
          const movePress = (e) => {
            if (!e.touches) return;
            const dx = Math.abs(e.touches[0].clientX - startX);
            const dy = Math.abs(e.touches[0].clientY - startY);
            if (dx > 10 || dy > 10) clearTimeout(pressTimer);
          };
          
          card.addEventListener('mousedown', startPress);
          card.addEventListener('touchstart', startPress, { passive: true });
          card.addEventListener('mouseup', cancelPress);
          card.addEventListener('mouseleave', cancelPress);
          card.addEventListener('touchend', cancelPress);
          card.addEventListener('touchmove', movePress, { passive: true });

          card.onclick = (e) => {
            if (wasLongPress) {
              e.preventDefault();
              return;
            }
            if (multiSelectMode) toggleMultiSelect(note.id);
            else openEditor(note);
          };

          grid.appendChild(card);
        });
      }
      
      function getCategoryName(id) {
        const c = categories.find(c => c.id === id);
        return c ? c.name : 'Uncategorized';
      }

      function updateSelectionUI() {
        document.getElementById('selectionCount').innerText = selectedIds.size;
        document.querySelectorAll('.note-card').forEach(card => {
          if (selectedIds.has(card.dataset.id)) card.classList.add('selected');
          else card.classList.remove('selected');
        });
      }

      function toggleMultiSelect(id) {
        if (!multiSelectMode) {
          multiSelectMode = true;
          document.getElementById('selectionBar').classList.add('active');
        }
        
        if (selectedIds.has(id)) selectedIds.delete(id);
        else selectedIds.add(id);
        
        if (selectedIds.size === 0) {
          multiSelectMode = false;
          document.getElementById('selectionBar').classList.remove('active');
        }
        
        updateSelectionUI();
      }

      function openEditor(note) {
        activeNote = note;
        document.getElementById('editorTitle').value = note.title;
        document.getElementById('editorContent').value = note.content;
        document.getElementById('editorDate').innerText = new Date(note.modified).toLocaleDateString();
        
        const catSelect = document.getElementById('editorCategorySelect');
        catSelect.innerHTML = '<option value="all">Uncategorized</option>';
        categories.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id; opt.innerText = c.name;
          if (note.category === c.id) opt.selected = true;
          catSelect.appendChild(opt);
        });

        textHistory = [note.content || ''];
        historyIdx = 0;

        updateEditorStar();
        updateWordCount();
        document.getElementById('findReplacePanel').classList.remove('active');
        document.getElementById('editorMoreMenu').classList.remove('active');
        document.getElementById('editorOverlay').classList.add('active');
      }

      function updateEditorStar() {
        const useId = activeNote && activeNote.starred ? '#icon-star' : '#icon-star-border';
        document.getElementById('editorStarIcon').innerHTML = `<use href="${useId}"></use>`;
        document.getElementById('editorStarBtn').style.color = activeNote && activeNote.starred ? '#ffffff' : '';
      }

      function closeEditor() {
        saveCurrentNote();
        document.getElementById('editorOverlay').classList.remove('active');
        activeNote = null;
        renderNotes();
      }

      function saveCurrentNote() {
        if (!activeNote) return;
        activeNote.title = document.getElementById('editorTitle').value.trim();
        activeNote.content = document.getElementById('editorContent').value;
        activeNote.category = document.getElementById('editorCategorySelect').value;
        activeNote.modified = Date.now();
        document.getElementById('editorDate').innerText = new Date(activeNote.modified).toLocaleDateString();
        saveNoteDB(activeNote);
      }

      function pushHistory(val) {
        if (textHistory[historyIdx] === val) return;
        textHistory = textHistory.slice(0, historyIdx + 1);
        textHistory.push(val);
        if (textHistory.length > 50) textHistory.shift();
        else historyIdx++;
      }

      function doUndo() {
        if (historyIdx > 0) {
          historyIdx--;
          document.getElementById('editorContent').value = textHistory[historyIdx];
          updateWordCount();
          saveCurrentNote();
        }
      }

      function doRedo() {
        if (historyIdx < textHistory.length - 1) {
          historyIdx++;
          document.getElementById('editorContent').value = textHistory[historyIdx];
          updateWordCount();
          saveCurrentNote();
        }
      }

      function updateWordCount() {
        const text = document.getElementById('editorContent').value;
        const words = text.trim() ? text.trim().split(/\s+/).length : 0;
        document.getElementById('editorWordCount').innerText = `${words} words`;
        document.getElementById('editorCharCount').innerText = `${text.length} chars`;
      }

      document.getElementById('editorContent').addEventListener('input', (e) => {
        clearTimeout(saveTimeout);
        clearTimeout(historyTimeout);
        updateWordCount();
        if (document.getElementById('findReplacePanel').classList.contains('active')) executeFind();
        saveTimeout = setTimeout(saveCurrentNote, 1000);
        historyTimeout = setTimeout(() => {
          pushHistory(e.target.value);
        }, 400);
      });
      
      document.getElementById('editorTitle').addEventListener('input', () => {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(saveCurrentNote, 1000);
      });
      document.getElementById('editorCategorySelect').addEventListener('change', saveCurrentNote);

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(err => {
            console.warn(`Error attempting to enable full-screen mode: ${err.message}`);
          });
        } else {
          if (document.exitFullscreen) {
            document.exitFullscreen();
          }
        }
      }

      function toggleFindReplace() {
        const panel = document.getElementById('findReplacePanel');
        panel.classList.toggle('active');
        if (panel.classList.contains('active')) {
          document.getElementById('findInput').focus();
          executeFind();
        } else {
          document.getElementById('editorContent').focus();
        }
      }
      
      document.getElementById('closeFindBtn').onclick = () => {
        document.getElementById('findReplacePanel').classList.remove('active');
      };

      function executeFind() {
        const text = document.getElementById('editorContent').value;
        const query = document.getElementById('findInput').value;
        findMatches = [];
        if (!query) {
          updateFindUI(-1);
          return;
        }

        const regex = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
        let match;
        while ((match = regex.exec(text)) !== null) {
          findMatches.push({ index: match.index, length: match[0].length });
        }
        
        currentMatchIdx = findMatches.length > 0 ? 0 : -1;
        updateFindUI(currentMatchIdx);
      }

      function updateFindUI(idx) {
        currentMatchIdx = idx;
        const counter = document.getElementById('findCounter');
        if (findMatches.length === 0) {
          counter.innerText = '0/0';
          return;
        }
        counter.innerText = `${idx + 1}/${findMatches.length}`;
        
        const match = findMatches[idx];
        const ta = document.getElementById('editorContent');
        
        ta.focus({ preventScroll: true });
        ta.setSelectionRange(match.index, match.index + match.length);
        
        let mirror = document.getElementById('ta-mirror');
        if (!mirror) {
          mirror = document.createElement('div');
          mirror.id = 'ta-mirror';
          document.body.appendChild(mirror);
        }
        
        const style = window.getComputedStyle(ta);
        mirror.style.cssText = `
          position: absolute;
          visibility: hidden;
          white-space: pre-wrap;
          word-wrap: break-word;
          overflow-wrap: break-word;
          top: 0; 
          left: 0;
          width: ${ta.clientWidth}px;
          font-family: ${style.fontFamily};
          font-size: ${style.fontSize};
          line-height: ${style.lineHeight};
          padding: ${style.padding};
          border: ${style.border};
          box-sizing: border-box;
        `;
        
        mirror.textContent = ta.value.substring(0, match.index);
        const span = document.createElement('span');
        span.textContent = ta.value.substring(match.index, match.index + match.length);
        mirror.appendChild(span);
        
        ta.scrollTop = span.offsetTop - (ta.clientHeight / 2) + (span.offsetHeight / 2);
      }

      function navFind(dir) {
        if (findMatches.length === 0) return;
        let next = currentMatchIdx + dir;
        if (next >= findMatches.length) next = 0;
        if (next < 0) next = findMatches.length - 1;
        updateFindUI(next);
      }

      function execReplace() {
        if (currentMatchIdx < 0 || findMatches.length === 0) return;
        const rep = document.getElementById('replaceInput').value;
        const ta = document.getElementById('editorContent');
        const match = findMatches[currentMatchIdx];
        
        ta.value = ta.value.substring(0, match.index) + rep + ta.value.substring(match.index + match.length);
        executeFind(); 
      }

      function execReplaceAll() {
        const query = document.getElementById('findInput').value;
        if (!query) return;
        const rep = document.getElementById('replaceInput').value;
        const ta = document.getElementById('editorContent');
        const regex = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
        ta.value = ta.value.replace(regex, rep);
        executeFind();
      }

      function showModal(title, contentHTML, actions) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalContent').innerHTML = contentHTML;
        const actDiv = document.getElementById('modalActions');
        actDiv.innerHTML = '';
        actions.forEach(a => {
          const btn = document.createElement('button');
          btn.className = `btn ${a.filled ? 'btn-filled' : 'btn-text'}`;
          
          if (a.label === 'Download') {
            btn.innerHTML = `Download<svg class="icon" viewBox="0 0 24 24" style="margin-left: 1rem; vertical-align: middle; width: 18px; height: 18px;"><use href="#icon-download"></use></svg>`;
          } else {
            btn.innerText = a.label;
          }
          
          btn.onclick = () => { a.onclick(); closeModal(); };
          actDiv.appendChild(btn);
        });
        document.getElementById('modalBackdrop').classList.add('active');
      }
      function closeModal() { document.getElementById('modalBackdrop').classList.remove('active'); }

      function manageCategories() {
      let html = `<div class="cat-manage-list">`;
      categories.forEach(c => {
        html += `<div class="cat-manage-item">
          <span style="font-weight: 500;">${escapeHTML(c.name)}</span>
          <div style="display: flex; gap: 4px;">
            <button class="icon-btn" onclick="renameCat('${c.id}')"><svg class="icon" viewBox="0 0 24 24"><use href="#icon-pencil"></use></svg></button>
            <button class="icon-btn" onclick="deleteCat('${c.id}')" style="color:var(--md-sys-color-error)"><svg class="icon" viewBox="0 0 24 24"><use href="#icon-delete"></use></svg></button>
          </div>
        </div>`;
      });
      html += `</div>
        <div style="margin-top:20px; display:flex; gap:12px; flex-wrap:wrap;">
          <input type="text" id="newCatInput" class="modal-input" placeholder="New Category" style="flex:1;" />
          <button class="btn btn-filled" onclick="addCat()">Add</button>
          <button class="btn btn-text" onclick="restoreDefaultCategories()" style="flex:0 0 auto;">Restore Defaults</button>
        </div>`;
      
      showModal('Manage Categories', html, [
        { label: 'Done', filled: true, onclick: () => renderSidebar() }
      ]);
}

      window.addCat = async function() {
        const val = document.getElementById('newCatInput').value.trim();
        if (val && !categories.find(c => c.name.toLowerCase() === val.toLowerCase())) {
          const id = 'cat_' + Date.now();
          const obj = { id, name: val };
          await txPromise('categories', 'readwrite', s => s.put(obj));
          categories.push(obj);
          manageCategories(); 
        }
      }
      window.renameCat = async function(id) {
        const cat = categories.find(c => c.id === id);
        const newVal = prompt('Rename category:', cat.name);
        if (newVal && newVal.trim()) {
          cat.name = newVal.trim();
          await txPromise('categories', 'readwrite', s => s.put(cat));
          manageCategories();
        }
      }
      window.deleteCat = async function(id) {
        if (confirm('Delete category? Notes will become Uncategorized.')) {
          await txPromise('categories', 'readwrite', s => s.delete(id));
          categories = categories.filter(c => c.id !== id);
          
          for (let n of notes) {
            if (n.category === id) {
              n.category = 'all';
              await txPromise('notes', 'readwrite', s => s.put(n));
            }
          }
          if (activeFilter === id) activeFilter = 'all';
          manageCategories();
          renderNotes();
        }
      }

      async function handleTxtImport(e) {
        for (let file of e.target.files) {
          const text = await file.text();
          const id = 'note_' + Date.now() + Math.random().toString(36).substr(2);
          await saveNoteDB({
            id,
            title: file.name.replace(/\.txt$/i, ''),
            content: text,
            category: activeFilter !== 'all' && activeFilter !== 'starred' ? activeFilter : 'all',
            starred: false,
            created: Date.now(),
            modified: Date.now()
          });
        }
        renderNotes();
        e.target.value = ''; 
      }

      async function handleJsonImport(e) {
        const file = e.target.files[0];
        if (!file) return;
        const text = await file.text();
        try {
          let data = JSON.parse(text);
          let importedCount = 0;
          
          if (data && typeof data === 'object' && !Array.isArray(data)) {
            data = Object.values(data);
          }

          if (Array.isArray(data)) {
            for (let n of data) {
              if (!n.id) continue;
              
              const noteToSave = {
                id: n.id.toString(),
                title: n.title || '',
                content: n.content || '',
                category: n.category || 'all',
                starred: n.starred !== undefined ? n.starred : (n.favorite || false),
                created: n.created || (n.date ? new Date(n.date).getTime() : Date.now()),
                modified: n.modified || (n.date ? new Date(n.date).getTime() : Date.now())
              };
              
              await saveNoteDB(noteToSave);
              importedCount++;
            }
            if (importedCount > 0) {
              renderNotes(true);
              alert(`Successfully imported ${importedCount} notes!`);
            } else {
              alert('No valid notes found to import.');
            }
          }
        } catch(err) { alert('Invalid JSON file.'); }
        e.target.value = '';
      }

      function exportJson() {
        const blob = new Blob([JSON.stringify(notes, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `NotesBackup_${Date.now()}.json`;
        a.click();
      }

      async function bulkDownloadZip() {
        const zip = new JSZip();
        selectedIds.forEach(id => {
          const n = notes.find(x => x.id === id);
          if (n) {
            const displayTitle = (n.title && n.title.trim()) ? n.title : 
                                 (n.content && n.content.trim() ? n.content.trim().split(/\s+/).slice(0, 5).join(' ') : 'title');
            zip.file(`${displayTitle.replace(/[^\w\s-]/gi, '_')}.txt`, n.content || '');
          }
        });
        const blob = await zip.generateAsync({ type: 'blob' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Notes_Selection_${Date.now()}.zip`;
        a.click();
        
        selectedIds.clear();
        multiSelectMode = false;
        document.getElementById('selectionBar').classList.remove('active');
        updateSelectionUI();
      }

      function downloadEditorNote() {
        const html = `
          <div style="position: relative; display: flex; align-items: center;">
            <select id="dlFormat" class="modal-input" style="appearance: none; -webkit-appearance: none; padding-right: 48px; background: transparent; z-index: 1;">
              <option value="txt" style="margin-left: 1rem;">Plain Text (.txt)</option>
              <option value="pdf" style="margin-left: 1rem;">PDF Document (.pdf)</option>
            </select>
            <svg class="icon" viewBox="0 0 24 24" style="position: absolute; right: 16px; pointer-events: none; width: 22px; height: 22px; color: var(--md-sys-color-outline);"><use href="#icon-chevron-down"></use></svg>
          </div>
        `;
        showModal('Download Note', html, [
          { label: 'Cancel', filled: false, onclick: () => {} },
          { label: 'Download', filled: true, onclick: () => {
              const format = document.getElementById('dlFormat').value;
              const displayTitle = (activeNote.title && activeNote.title.trim()) ? activeNote.title : 
                                   (activeNote.content && activeNote.content.trim() ? activeNote.content.trim().split(/\s+/).slice(0, 5).join(' ') : 'title');
              const title = displayTitle.replace(/[^\w\s-]/gi, '_');
              
              if (format === 'txt') {
                const blob = new Blob([activeNote.content], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = title + '.txt';
                a.click();
              } else if (format === 'pdf') {
                const div = document.createElement('div');
                div.style.padding = '30px';
                div.style.fontFamily = 'Inter, sans-serif';
                div.innerHTML = `<h1 style="margin-bottom:10px;">${escapeHTML(displayTitle)}</h1><hr style="border:none; border-bottom:1px solid #ccc; margin-bottom: 20px;"><div style="white-space:pre-wrap; line-height: 1.6; font-size: 14px;">${escapeHTML(activeNote.content)}</div>`;
                html2pdf().from(div).save(title + '.pdf');
              }
            } 
          }
        ]);
      }

      window.toggleSidebar = function(force) {
        const sb = document.getElementById('sidebar');
        sb.classList.toggle('open', force);
      };

      function setupEvents() {
        document.querySelectorAll('.sidebar .drawer-item[data-filter]').forEach(el => {
          el.onclick = () => setFilter(el.dataset.filter);
        });

        const themeBtnSide = document.getElementById('themeToggleBtnSide');
        const themeIconSide = document.getElementById('themeIconSide');
        const setTheme = (isDark) => {
          document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
          themeIconSide.innerHTML = `<use href="${isDark ? '#icon-light' : '#icon-dark'}"></use>`;
        };
        themeBtnSide.onclick = () => {
          const current = document.documentElement.getAttribute('data-theme');
          setTheme(current === 'light');
        };

        document.getElementById('menuToggleBtn').onclick = () => toggleSidebar(true);
        document.getElementById('closeSidebarBtn').onclick = () => toggleSidebar(false);

        document.getElementById('searchInput').addEventListener('input', () => {
          clearTimeout(searchTimeout);
          searchTimeout = setTimeout(() => renderNotes(true), 300);
        });

        document.getElementById('notesView').addEventListener('scroll', (e) => {
          const view = e.target;
          if (view.scrollTop + view.clientHeight >= view.scrollHeight - 50) {
            if (renderPage * pageSize < currentFilteredNotes.length) {
              renderPage++;
              renderNotes(false);
            }
          }
        });

        document.getElementById('sortSelect').addEventListener('change', (e) => {
          sortBy = e.target.value;
          renderNotes();
        });

        document.getElementById('newNoteFab').onclick = async () => {
          const id = 'note_' + Date.now();
          const newNote = {
            id, title: '', content: '',
            category: activeFilter !== 'all' && activeFilter !== 'starred' ? activeFilter : 'all',
            starred: false, created: Date.now(), modified: Date.now()
          };
          await saveNoteDB(newNote);
          renderNotes(true);
          openEditor(newNote);
        };

        document.getElementById('closeEditorBtn').onclick = closeEditor;
        document.getElementById('editorStarBtn').onclick = () => {
          if(activeNote) {
            activeNote.starred = !activeNote.starred;
            updateEditorStar();
            saveCurrentNote();
          }
        };

        document.getElementById('editorMoreBtn').onclick = (e) => {
          e.stopPropagation();
          document.getElementById('editorMoreMenu').classList.toggle('active');
        };

        document.addEventListener('click', (e) => {
          const menu = document.getElementById('editorMoreMenu');
          if (menu && menu.classList.contains('active') && !e.target.closest('#editorDropdown')) {
            menu.classList.remove('active');
          }
        });

        document.getElementById('editorUndoBtn').onclick = () => {
          document.getElementById('editorMoreMenu').classList.remove('active');
          doUndo();
        };

        document.getElementById('editorRedoBtn').onclick = () => {
          document.getElementById('editorMoreMenu').classList.remove('active');
          doRedo();
        };

        document.getElementById('editorFullscreenBtn').onclick = () => {
          document.getElementById('editorMoreMenu').classList.remove('active');
          toggleFullscreen();
        };

        document.getElementById('editorDownloadBtn').onclick = () => {
          document.getElementById('editorMoreMenu').classList.remove('active');
          downloadEditorNote();
        };

        document.getElementById('editorDeleteBtn').onclick = () => {
          document.getElementById('editorMoreMenu').classList.remove('active');
          showModal('Delete Note?', 'This action cannot be undone.', [
            { label: 'Cancel', filled: false, onclick: () => {} },
            { label: 'Delete', filled: true, onclick: async () => {
              if (activeNote) await deleteNoteDB(activeNote.id);
              document.getElementById('editorOverlay').classList.remove('active');
              activeNote = null;
              renderNotes();
            }}
          ]);
        };

        document.getElementById('editorFindBtn').onclick = toggleFindReplace;
        document.getElementById('findInput').oninput = executeFind;
        document.getElementById('findNextBtn').onclick = () => navFind(1);
        document.getElementById('findPrevBtn').onclick = () => navFind(-1);
        document.getElementById('replaceBtn').onclick = execReplace;
        document.getElementById('replaceAllBtn').onclick = execReplaceAll;

        document.getElementById('manageCatsBtn').onclick = manageCategories;

        document.getElementById('importTxtBtn').onclick = () => document.getElementById('fileImportTxt').click();
        document.getElementById('fileImportTxt').onchange = handleTxtImport;
        
        document.getElementById('importJsonBtn').onclick = () => document.getElementById('fileImportJson').click();
        document.getElementById('fileImportJson').onchange = handleJsonImport;
        
        document.getElementById('exportJsonBtn').onclick = exportJson;

        document.getElementById('toggleSelectAllBtn').onclick = () => {
          const allSelected = currentFilteredNotes.length > 0 && currentFilteredNotes.every(n => selectedIds.has(n.id));
          
          if (allSelected) {
            currentFilteredNotes.forEach(n => selectedIds.delete(n.id));
            if (selectedIds.size === 0) {
              multiSelectMode = false;
              document.getElementById('selectionBar').classList.remove('active');
            }
          } else {
            currentFilteredNotes.forEach(n => selectedIds.add(n.id));
          }
          updateSelectionUI();
        };

        document.getElementById('cancelSelectBtn').onclick = () => {
          multiSelectMode = false; selectedIds.clear();
          document.getElementById('selectionBar').classList.remove('active');
          updateSelectionUI();
        };

        document.getElementById('bulkDeleteBtn').onclick = () => {
          showModal('Delete Selected?', `Delete ${selectedIds.size} notes permanently?`, [
            { label: 'Cancel', filled: false, onclick: () => {} },
            { label: 'Delete', filled: true, onclick: async () => {
              for (let id of selectedIds) await deleteNoteDB(id);
              selectedIds.clear(); multiSelectMode = false;
              document.getElementById('selectionBar').classList.remove('active');
              renderNotes();
            }}
          ]);
        };
        document.getElementById('bulkDownloadBtn').onclick = bulkDownloadZip;
      }

      function escapeHTML(str) {
        return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      document.addEventListener('fullscreenchange', () => {
        const btn = document.getElementById('editorFullscreenBtn');
        if (document.fullscreenElement) {
          btn.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><use href="#icon-fullscreen"></use></svg> Exit`;
        } else {
          btn.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><use href="#icon-fullscreen"></use></svg> Full Screen`;
        }
      });

      window.restoreDefaultCategories = async function() {
        const defaults = ['Personal', 'Work', 'Ideas'];
        let added = 0;
        for (let name of defaults) {
          if (!categories.find(c => c.name.toLowerCase() === name.toLowerCase())) {
            const id = 'cat_' + Date.now() + Math.random().toString(36).substr(2);
            const obj = { id, name };
            await txPromise('categories', 'readwrite', s => s.put(obj));
            categories.push(obj);
            added++;
          }
        }
        if (added) {
          renderSidebar();
          manageCategories();
        } else {
          alert('All default categories already exist.');
        }
      };

      function setupPWA() {
        const manifest = {
          name: "NoteTakeApp",
          short_name: "NoteTake",
          start_url: location.href.split('?')[0],
          display: "standalone",
          background_color: "#131314",
          theme_color: "#131314",
          icons: [{
            src: "https://www.svgrepo.com/show/192484/notepad-notebook.svg",
            sizes: "192x192",
            type: "image/svg+xml",
            purpose: "any maskable"
          }]
        };
        document.getElementById('manifest-link').href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          deferredPrompt = e;
        });

        document.getElementById('installAppBtn').onclick = async () => {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
              document.getElementById('installAppBtn').style.display = 'none';
            }
            deferredPrompt = null;
          } else {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            let instructions = 'To install this app on your device:<br><br>';
            if (isIOS) {
              instructions += '1. Tap the <strong>Share</strong> button at the bottom of Safari.<br>2. Scroll down and tap <strong>Add to Home Screen</strong>.';
            } else {
              instructions += '1. Click the browser\'s <strong>Menu</strong> icon (three dots) in the top-right corner.<br>2. Select <strong>Save page as app</strong>, <strong>Install</strong>, or <strong>Add to Home Screen</strong>.';
            }
            showModal('Install App', instructions, [{ label: 'Got It', filled: true, onclick: () => {} }]);
          }
        };

        const swCode = `
          const CACHE_NAME = 'notepro-v1';
          self.addEventListener('install', e => self.skipWaiting());
          self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
          self.addEventListener('fetch', e => {
            e.respondWith(caches.match(e.request).then(res => res || fetch(e.request).catch(() => new Response('Offline'))));
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(e => console.log('Blob SW blocked by strict security policy.'));
        }
      }

      window.onload = async () => {
        setupEvents();
        await initDB();
        await loadData();
        renderSidebar();
        renderNotes(true);
        setupPWA();
      };
    </script>
  </body>
</html>
